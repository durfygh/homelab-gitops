apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ollama-secret
spec:
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: ollama-secret
  data:
    - secretKey: users
      remoteRef:
        key: kv/ollama
        property: users

---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: ollama-basic-auth
spec:
  basicAuth:
    headerField: x-api-key
    secret: ollama-secret

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ollama-ingress
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`ollama.durp.info`) && PathPrefix(`/`)
      middlewares:
        - name: ollama-basic-auth
      kind: Rule
      services:
        - name: unraid
          port: 11435
  tls:
    secretName: ollama-tls

---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ollama-tls
spec:
  secretName: ollama-tls
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  commonName: "ollama.durp.info"
  dnsNames:
    - "ollama.durp.info"

---
kind: Service
apiVersion: v1
metadata:
  name: ollama-external-dns
  annotations:
    external-dns.alpha.kubernetes.io/hostname: ollama.durp.info
spec:
  type: ExternalName
  externalName: durp.info