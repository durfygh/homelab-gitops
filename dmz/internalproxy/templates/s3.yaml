apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: s3-ingress
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`s3.internal.durp.info`) && PathPrefix(`/`)
      middlewares:
        - name: whitelist
          namespace: traefik
      kind: Rule
      services:
        - name: unraid
          port: 9768
          scheme: http
  tls:
    secretName: s3-tls

---

apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: s3-tls
spec:
  secretName: s3-tls
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  commonName: "s3.internal.durp.info"
  dnsNames:
    - "s3.internal.durp.info"

---

apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: s3-ingress-external
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`s3.durp.info`) && PathPrefix(`/`)
      kind: Rule
      services:
        - name: unraid
          port: 9768
          scheme: http
  tls:
    secretName: s3-external-tls

---

apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: s3-external-tls
spec:
  secretName: s3-external-tls
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  commonName: "s3.durp.info"
  dnsNames:
    - "s3.durp.info"

---

kind: Service
apiVersion: v1
metadata:
  name: s3-external-dns
  annotations:
    external-dns.alpha.kubernetes.io/hostname: s3.durp.info
spec:
  type: ExternalName
  externalName: durp.info
