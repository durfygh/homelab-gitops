apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: smokeping-ingress
spec:
  entryPoints:
    - websecure
  routes:
  - match: Host(`smokeping.durp.info`) && PathPrefix(`/`)
    middlewares:
    - name: whitelist
      namespace: traefik
    - name: authentik-proxy-provider
      namespace: traefik  
    kind: Rule
    services:
    - name: unraid
      port: 81
  tls:
    secretName: smokeping-tls

---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: smokeping-tls
spec:
  secretName: smokeping-tls
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  commonName: "smokeping.durp.info"
  dnsNames:
  - "smokeping.durp.info"  

---
kind: Service
apiVersion: v1
metadata:
  name: smokeping-external-dns
  annotations:
    external-dns.alpha.kubernetes.io/hostname: smokeping.durp.info
spec:
  type: ExternalName
  externalName: durp.info  
