apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: unraid-ingress
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`unraid.internal.durp.info`) && PathPrefix(`/`)
      middlewares:
        - name: whitelist
          namespace: traefik
      kind: Rule
      services:
        - name: unraid
          port: 443
          scheme: https
  tls:
    secretName: unraid-tls

---

apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: unraid-tls
spec:
  secretName: unraid-tls
  issuerRef:
    name: vault-issuer
    kind: ClusterIssuer
  commonName: "unraid.internal.durp.info"
  dnsNames:
    - "unraid.internal.durp.info"
