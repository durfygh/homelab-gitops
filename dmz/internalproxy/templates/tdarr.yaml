apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: tdarr-ingress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
spec:
  entryPoints:
    - websecure
  routes:
  - match: Host(`tdarr.internal.durp.info`)
    middlewares:
    - name: whitelist
      namespace: traefik  
    - name: authentik-proxy-provider
      namespace: traefik  
    kind: Rule
    services:
    - name: unraid
      port: 8267
      scheme: http
  tls:
    secretName: tdarr-tls  

---

apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: tdarr-tls
spec:
  secretName: tdarr-tls
  issuerRef:
    name: vault-issuer
    kind: ClusterIssuer
  commonName: "tdarr.internal.durp.info"
  dnsNames:
  - "tdarr.internal.durp.info"  
