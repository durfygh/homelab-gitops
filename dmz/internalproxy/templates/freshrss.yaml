apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: freshrss-ingress
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`freshrss.durp.info`) && PathPrefix(`/`)
      kind: Rule
      services:
        - name: unraid
          port: 8085
  tls:
    secretName: freshrss-tls

---

apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: freshrss-tls
spec:
  secretName: freshrss-tls
  issuerRef:
    name: vault-issuer
    kind: ClusterIssuer
  commonName: "freshrss.durp.info"
  dnsNames:
    - "freshrss.durp.info"
