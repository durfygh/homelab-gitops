apiVersion: v1
kind: Service
metadata:
  name: forgejo
spec:
  ports:
    - name: app
      port: 3000
      protocol: TCP
      targetPort: 3000
  clusterIP: None
  type: ClusterIP

---

apiVersion: v1
kind: Endpoints
metadata:
  name: forgejo
subsets:
  - addresses:
      - ip: 192.168.21.200
    ports:
      - name: app
        port: 3000
        protocol: TCP

---

apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: forgejo-ingress
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`forgejo.durp.info`) && PathPrefix(`/`)
      kind: Rule
      services:
        - name: forgejo
          port: 3000
          scheme: http
  tls:
    secretName: forgejo-tls

---

apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: forgejo-tls
spec:
  secretName: forgejo-tls
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  commonName: "forgejo.durp.info"
  dnsNames:
    - "forgejo.durp.info"

---

kind: Service
apiVersion: v1
metadata:
  name: forgejo-external-dns
  annotations:
    external-dns.alpha.kubernetes.io/hostname: forgejo.durp.info
spec:
  type: ExternalName
  externalName: durp.info
