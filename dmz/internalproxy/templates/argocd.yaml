apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd-infra-ingress
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`argocd.infra.durp.info`)
      middlewares:
        - name: whitelist
          namespace: traefik
      kind: Rule
      services:
        - name: infra-cluster
          port: 443
          scheme: https
  tls:
    secretName: argocd-infra-tls

---

apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argocd-infra-tls
spec:
  secretName: argocd-infra-tls
  issuerRef:
    name: vault-issuer
    kind: ClusterIssuer
  commonName: "argocd.infra.durp.info"
  dnsNames:
    - "argocd.infra.durp.info"
